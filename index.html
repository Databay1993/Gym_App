let tokenClient;
window.onGoogleLibraryLoad = () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('Google Login fehlgeschlagen ✗'); return; }
      state.accessToken = resp.access_token;
      state.syncStatus = 'connected';
      showToast('Verbunden ✓ Lade Daten...');
      render();
      await syncFromDrive();
    }
  });
};

function googleSignIn() {
  if (!tokenClient) { showToast('Google noch nicht geladen...'); return; }
  tokenClient.requestAccessToken();
}
function googleSignOut() {
  if (state.accessToken) google.accounts.oauth2.revoke(state.accessToken);
  state.accessToken = null; state.driveFileId = null; state.syncStatus = 'disconnected';
  showToast('Abgemeldet'); render();
}

async function syncFromDrive() {
  if (!state.accessToken) return;
  state.syncStatus = 'syncing'; render();
  try {
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE}'&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${state.accessToken}` } }
    );
    const searchData = await search.json();
    if (searchData.files && searchData.files.length > 0) {
      state.driveFileId = searchData.files[0].id;
      const dl = await fetch(
        `https://www.googleapis.com/drive/v3/files/${state.driveFileId}?alt=media`,
        { headers: { Authorization: `Bearer ${state.accessToken}` } }
      );
      const driveData = await dl.json();
      state.data = mergeData(state.data, driveData);
      saveLocal();
      showToast('Daten synchronisiert ✓');
    } else {
      await syncToDrive();
    }
  } catch(e) { showToast('Sync Fehler ✗'); }
  state.syncStatus = 'connected'; render();
}

async function syncToDrive() {
  if (!state.accessToken) return;
  state.syncStatus = 'syncing'; render();
  try {
    const body = JSON.stringify(state.data);
    if (state.driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${state.accessToken}`, 'Content-Type': 'application/json' },
        body
      });
    } else {
      const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: `Bearer ${state.accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: DRIVE_FILE, parents: ['appDataFolder'] })
      });
      const metaData = await meta.json();
      state.driveFileId = metaData.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${state.accessToken}`, 'Content-Type': 'application/json' },
        body
      });
    }
  } catch(e) { showToast('Drive Fehler ✗'); }
  state.syncStatus = 'connected'; render();
}

function mergeData(local, drive) {
  const merged = { history: {}, customExercises: [] };
  const allKeys = new Set([...Object.keys(local.history||{}), ...Object.keys(drive.history||{})]);
  allKeys.forEach(key => {
    const combined = [...(local.history[key]||[]), ...(drive.history[key]||[])];
    const seen = new Set();
    merged.history[key] = combined.filter(e => { const k=e.date; if(seen.has(k))return false; seen.add(k); return true; })
      .sort((a,b) => a.date.localeCompare(b.date));
  });
  merged.customExercises = [...new Set([...(local.customExercises||[]), ...(drive.customExercises||[])])];
  return merged;
}

function setState(patch) { Object.assign(state, patch); render(); }
function showToast(msg) {
  clearTimeout(state.toastTimer); state.toast = msg;
  state.toastTimer = setTimeout(() => { state.toast = null; render(); }, 2400); render();
}
function allExercises() { return [...DEFAULT_EXERCISES, ...(state.data.customExercises||[])]; }
function getLastSession(name) { const h = state.data.history[name]; return h&&h.length ? h[h.length-1] : null; }
function totalWorkouts() { const d=new Set(); Object.values(state.data.history).forEach(a=>a.forEach(e=>d.add(e.date?.slice(0,10)))); return d.size; }

function calcRepsHint(lastReps, lastWeight, newWeight) {
  const r=parseFloat(lastReps), w=parseFloat(lastWeight), nw=parseFloat(newWeight);
  if(!r||!w||!nw||nw===w) return null;
  const est = Math.round((w*(1+r/30)/nw-1)*30);
  return (est>=1&&est<=50) ? est : null;
}
function updateWeightWithHint(exName, idx, newWeight) {
  updateSet(exName, idx, 'weight', newWeight);
  const lastSet = getLastSession(exName)?.sets[idx];
  if(!lastSet) return;
  const hint = calcRepsHint(lastSet.reps, lastSet.weight, newWeight);
  const el = document.getElementById('hint_'+(exName+'-'+idx).replace(/[^a-zA-Z0-9]/g,'_'));
  if(el) { el.textContent = hint?'~'+hint+' Wdh.':''; el.style.display = hint?'block':'none'; }
}

function startRestTimer() {
  clearInterval(state.timerInterval);
  state.timerEndAt = Date.now() + state.restDuration * 1000;
  state.timerMax = state.restDuration;
  state.timerSeconds = state.restDuration;
  render();
  state.timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.round((state.timerEndAt - Date.now()) / 1000));
    state.timerSeconds = remaining;
    updateTimerDisplay();
    if(remaining <= 0) {
      clearInterval(state.timerInterval); state.timerInterval = null;
      playBeep();
      setTimeout(() => { state.timerSeconds = null; render(); }, 1500);
    }
  }, 500);
}
function cancelTimer() {
  clearInterval(state.timerInterval); state.timerInterval = null;
  state.timerSeconds = null; render();
}
function updateTimerDisplay() {
  const bubble = document.getElementById('timerBubble'); if(!bubble) { render(); return; }
  const num = bubble.querySelector('.timer-num');
  const prog = bubble.querySelector('.timer-progress');
  if(num) num.textContent = state.timerSeconds;
  if(prog) {
    const r=33, circ=2*Math.PI*r, pct=state.timerSeconds/state.timerMax;
    prog.style.strokeDasharray = circ;
    prog.style.strokeDashoffset = circ*(1-pct);
    if(state.timerSeconds<=10) prog.classList.add('urgent');
    else prog.classList.remove('urgent');
  }
}
function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.15,0.3].forEach(delay => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = delay===0.3?880:660; osc.type='sine';
      gain.gain.setValueAtTime(0.4, ctx.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.25);
      osc.start(ctx.currentTime+delay); osc.stop(ctx.currentTime+delay+0.25);
    });
  } catch(e) {}
}
function timerHTML() {
  if(state.timerSeconds===null) return '';
  const r=33, circ=2*Math.PI*r, pct=state.timerSeconds/state.timerMax;
  const offset=circ*(1-pct), urgent=state.timerSeconds<=10?'urgent':'';
  return `<div class="timer-bubble" id="timerBubble" onclick="cancelTimer()">
    <svg class="timer-svg" viewBox="0 0 72 72">
      <circle class="timer-track" cx="36" cy="36" r="${r}"/>
      <circle class="timer-progress ${urgent}" cx="36" cy="36" r="${r}"
        style="stroke-dasharray:${circ};stroke-dashoffset:${offset}"/>
    </svg>
    <div class="timer-num">${state.timerSeconds}</div>
    <div class="timer-label">tippen ✕</div>
  </div>`;
}

function startWorkout() { setState({ workout: { date: new Date().toISOString(), exercises: [] }, view: 'workout' }); }

function addExerciseToWorkout(name) {
  if(state.workout.exercises.find(e=>e.name===name)) { showToast('Bereits hinzugefügt'); return; }
  const last = getLastSession(name);
  const sets = last ? last.sets.map(s=>({reps:s.reps,weight:s.weight,done:false})) : [];
  state.workout.exercises.push({name,sets});
  setState({showAddEx:false,addExFilter:''});
  setTimeout(()=>{ const s=document.querySelector('.scroll'); if(s) s.scrollTop=s.scrollHeight; },80);
}

function addSet(exName) {
  const ex=state.workout.exercises.find(e=>e.name===exName); if(!ex) return;
  const prev=ex.sets[ex.sets.length-1];
  ex.sets.push({reps:prev?.reps||'',weight:prev?.weight||'',done:false});
  const scrollEl=document.querySelector('.scroll');
  const scrollPos=scrollEl?scrollEl.scrollTop:0;
  render();
  requestAnimationFrame(()=>{ const s=document.querySelector('.scroll'); if(s) s.scrollTop=scrollPos; });
}

function updateSet(exName,idx,field,value) {
  const ex=state.workout.exercises.find(e=>e.name===exName);
  if(ex&&ex.sets[idx]) ex.sets[idx][field]=value;
}
function toggleDone(exName,idx) {
  const ex=state.workout.exercises.find(e=>e.name===exName);
  if(ex&&ex.sets[idx]) {
    ex.sets[idx].done=!ex.sets[idx].done;
    if(ex.sets[idx].done) startRestTimer();
    else if(state.timerSeconds!==null) cancelTimer();
    const scrollEl=document.querySelector('.scroll');
    const scrollPos=scrollEl?scrollEl.scrollTop:0;
    render();
    requestAnimationFrame(()=>{ const s=document.querySelector('.scroll'); if(s) s.scrollTop=scrollPos; });
  }
}
function removeSet(exName,idx) {
  const ex=state.workout.exercises.find(e=>e.name===exName); if(!ex) return;
  const scrollEl=document.querySelector('.scroll');
  const scrollPos=scrollEl?scrollEl.scrollTop:0;
  ex.sets.splice(idx,1); render();
  requestAnimationFrame(()=>{ const s=document.querySelector('.scroll'); if(s) s.scrollTop=scrollPos; });
}
function removeExercise(name) { state.workout.exercises=state.workout.exercises.filter(e=>e.name!==name); render(); }

function finishWorkout() {
  document.querySelectorAll('.set-input').forEach(inp=>{
    const e=state.workout.exercises.find(e=>e.name===inp.dataset.ex);
    if(e&&e.sets[+inp.dataset.idx]) e.sets[+inp.dataset.idx][inp.dataset.field]=inp.value;
  });
  if(!state.workout.exercises.length) { showToast('Keine Übungen erfasst'); return; }
  const h={...state.data.history};
  state.workout.exercises.forEach(ex=>{
    const done=ex.sets.filter(s=>s.done||(s.reps&&s.weight));
    if(!done.length) return;
    if(!h[ex.name]) h[ex.name]=[];
    h[ex.name].push({date:state.workout.date,sets:done.map(s=>({reps:s.reps,weight:s.weight}))});
  });
  state.data.history=h; saveLocal();
  if(state.accessToken) syncToDrive();
  showToast('Workout gespeichert 💪');
  setState({workout:null,view:'home'});
}

function addCustomExercise(name) {
  name=name.trim(); if(!name) return;
  if(allExercises().includes(name)) { showToast('Übung existiert bereits'); return; }
  state.data.customExercises=[...(state.data.customExercises||[]),name];
  saveLocal(); showToast('Übung hinzugefügt ✓'); render();
}
function deleteHistoryEntry(exName,idx) { state.data.history[exName].splice(idx,1); saveLocal(); render(); }
function exportData() {
  const blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`ironlog-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Backup gespeichert ✓');
}
function importData(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ try {
    const p=JSON.parse(e.target.result); if(!p.history) throw 0;
    if(confirm('Daten überschreiben?')) { state.data=p; saveLocal(); if(state.accessToken) syncToDrive(); showToast('Importiert ✓'); render(); }
  } catch { showToast('Ungültige Datei ✗'); } };
  reader.readAsText(file);
}
function createAndAddExercise() {
  const inp=document.getElementById('newExWorkoutInput');
  const name=inp?.value.trim(); if(!name) return;
  if(allExercises().includes(name)) { showToast('Übung existiert bereits'); return; }
  state.data.customExercises=[...(state.data.customExercises||[]),name];
  saveLocal(); addExerciseToWorkout(name);
}
function render() {
  const app=document.getElementById('app');
  const fid=document.activeElement?.id;
  const ss=document.activeElement?.selectionStart, se=document.activeElement?.selectionEnd;
  if(state.view==='home') app.innerHTML=renderHome();
  else if(state.view==='history') app.innerHTML=renderHistory();
  else if(state.view==='workout') app.innerHTML=renderWorkout();
  if(state.toast) { const t=document.createElement('div'); t.className='toast'; t.textContent=state.toast; app.appendChild(t); }
  if(fid) { const el=document.getElementById(fid); if(el){el.focus();try{el.setSelectionRange(ss,se);}catch{}} }
}

function syncStatusHTML() {
  const labels={disconnected:'Nicht verbunden',connected:'Drive synchronisiert',syncing:'Wird synchronisiert...'};
  const dotClass=state.syncStatus==='connected'?'connected':state.syncStatus==='syncing'?'syncing':'';
  if(state.accessToken) {
    return `<div class="cloud-bar">
      <div class="cloud-status"><div class="cloud-dot ${dotClass}"></div><span>${labels[state.syncStatus]}</span></div>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" style="padding:6px 12px;font-size:12px" onclick="syncFromDrive()">↻ Sync</button>
        <button class="btn-secondary" style="padding:6px 12px;font-size:12px;color:#ff6b6b" onclick="googleSignOut()">Abmelden</button>
      </div>
    </div>`;
  }
  return `<button class="backup-btn" style="width:100%;gap:10px;margin-bottom:10px;border-color:rgba(232,255,74,.3)" onclick="googleSignIn()">
    <span style="font-size:18px">☁️</span>
    <div style="text-align:left"><div style="font-size:14px;color:var(--accent)">Mit Google Drive verbinden</div>
    <div style="font-size:11px;color:var(--muted)">Automatische Sicherung auf allen Geräten</div></div>
  </button>`;
}

function renderHome() {
  const tw=totalWorkouts(), te=Object.keys(state.data.history).length;
  const ts=Object.values(state.data.history).reduce((s,a)=>s+a.reduce((ss,e)=>ss+e.sets.length,0),0);
  return `
  <div class="header"><span class="logo">IRON LOG</span>
    <div class="nav-btn-row"><button class="nav-btn" onclick="setState({view:'history'})">Verlauf</button></div>
  </div>
  <div class="scroll"><div class="container">
    <div class="hero">
      <div class="hero-title">BEREIT ZUM<br/><span style="color:var(--accent)">PUSHEN?</span></div>
      <div class="hero-sub">Tracke jeden Satz. Schlage deinen Rekord.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${tw}</div><div class="stat-label">Workouts</div></div>
      <div class="stat-card"><div class="stat-num">${te}</div><div class="stat-label">Übungen</div></div>
      <div class="stat-card"><div class="stat-num">${ts}</div><div class="stat-label">Sätze</div></div>
    </div>
    <button class="btn-primary" onclick="startWorkout()">+ WORKOUT STARTEN</button>
    <div class="section-block"><div class="section-title">Cloud Sync</div>${syncStatusHTML()}</div>
    <div class="section-block"><div class="section-title">Pause Timer</div>
      <div class="rest-settings">
        <span>Pausenzeit nach jedem Satz</span>
        <button class="rest-btn" onclick="if(state.restDuration>10){state.restDuration-=5;render()}">−</button>
        <div class="rest-val">${state.restDuration}s</div>
        <button class="rest-btn" onclick="if(state.restDuration<300){state.restDuration+=5;render()}">+</button>
      </div>
    </div>
    <div class="section-block"><div class="section-title">Eigene Übung</div>
      <div class="input-row">
        <input class="text-input" id="customExInput" placeholder="Übungsname..."/>
        <button class="btn-secondary" onclick="addCustomExercise(document.getElementById('customExInput').value);document.getElementById('customExInput').value=''">+</button>
      </div>
    </div>
    <div class="section-block"><div class="section-title">Backup</div>
      <div class="backup-row">
        <button class="backup-btn" onclick="exportData()">⬇ Exportieren</button>
        <label class="backup-btn" style="cursor:pointer">⬆ Importieren<input type="file" accept=".json" style="display:none" onchange="importData(this.files[0]);this.value=''"/></label>
      </div>
      <div class="backup-hint">JSON-Backup als zusätzliche Sicherung</div>
    </div>
  </div></div>`;
}

function renderHistory() {
  const exList=Object.keys(state.data.history).filter(k=>state.data.history[k].length);
  const inner=exList.length===0?`<div class="empty-state">Noch kein Workout.<br/>Starte dein erstes Training!</div>`
    :exList.map(exName=>{
      const entries=[...state.data.history[exName]].reverse();
      const rows=entries.map((entry,ri)=>{
        const realIdx=state.data.history[exName].length-1-ri;
        const d=new Date(entry.date).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
        const chips=entry.sets.map(s=>`<span class="history-chip">${s.reps} × ${s.weight} kg</span>`).join('');
        return `<div class="history-entry"><div class="history-header">
          <div class="history-date">${d}</div>
          <button class="btn-icon" onclick="deleteHistoryEntry('${exName.replace(/'/g,"\\'")}',${realIdx})">🗑</button>
        </div><div class="history-sets">${chips}</div></div>`;
      }).join('');
      return `<div class="history-block"><div class="history-ex-title">${exName}</div>${rows}</div>`;
    }).join('');
  return `<div class="header"><span class="logo">IRON LOG</span>
    <button class="nav-btn" onclick="setState({view:'home'})">← Zurück</button></div>
  <div class="scroll"><div class="container">
    <div class="section-title" style="margin-top:4px">Verlauf</div>${inner}
  </div></div>`;
}

function renderWorkout() {
  const dateStr=new Date(state.workout.date).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
  const cards=state.workout.exercises.map(ex=>{
    const last=getLastSession(ex.name);
    const lastHTML=last
      ?`<div class="last-session"><div class="last-session-label">⏱ Letztes Mal · ${new Date(last.date).toLocaleDateString('de-DE',{day:'2-digit',month:'short'})}</div>
         <div class="last-sets">${last.sets.map((s,i)=>`<span class="last-set-chip">S${i+1}: ${s.reps}×${s.weight}kg</span>`).join('')}</div></div>`
      :`<div class="no-history">Erstes Mal – leg los! 🔥</div>`;
    const setsHTML=ex.sets.map((s,idx)=>{
      const uid=(ex.name+'-'+idx).replace(/[^a-zA-Z0-9]/g,'_');
      return `<div class="set-row">
        <div class="set-num">${idx+1}</div>
        <input id="reps_${uid}" class="set-input${s.done?' done':''}" type="text" inputmode="numeric" placeholder="Wdh." value="${s.reps}"
          data-ex="${ex.name.replace(/"/g,'&quot;')}" data-idx="${idx}" data-field="reps" oninput="updateSet(this.dataset.ex,+this.dataset.idx,'reps',this.value)"/>
        <div style="display:flex;flex-direction:column;gap:2px">
          <input id="wt_${uid}" class="set-input${s.done?' done':''}" type="text" inputmode="decimal" placeholder="kg" value="${s.weight}"
            data-ex="${ex.name.replace(/"/g,'&quot;')}" data-idx="${idx}" data-field="weight" oninput="updateWeightWithHint(this.dataset.ex,+this.dataset.idx,this.value)"/>
          <span id="hint_${uid}" class="reps-hint" style="display:none"></span>
        </div>
        <button class="check-btn${s.done?' done':''}" onclick="toggleDone('${ex.name.replace(/'/g,"\\'")}',${idx})">${s.done?'✓':'○'}</button>
        <button class="del-btn" onclick="removeSet('${ex.name.replace(/'/g,"\\'")}',${idx})">×</button>
      </div>`;
    }).join('');
    return `<div class="exercise-card">
      <div class="exercise-header"><span class="exercise-name">${ex.name}</span>
        <button class="btn-icon" style="color:#555;font-size:15px" onclick="removeExercise('${ex.name.replace(/'/g,"\\'")}')">✕</button></div>
      ${lastHTML}
      <div class="sets-body">${setsHTML}
        <button class="btn-ghost" onclick="addSet('${ex.name.replace(/'/g,"\\'")}')">+ Satz hinzufügen</button>
      </div></div>`;
  }).join('');
  const empty=state.workout.exercises.length===0?`<div class="empty-state">Noch keine Übung.<br/>Füge eine hinzu 👇</div>`:'';
  const modalHTML=state.showAddEx?(()=>{
    const fl=state.addExFilter.toLowerCase();
    const items=allExercises().filter(e=>e.toLowerCase().includes(fl)).map(e=>{
      const added=state.workout.exercises.find(ex=>ex.name===e);
      const custom=(state.data.customExercises||[]).includes(e);
      return `<li onclick="addExerciseToWorkout('${e.replace(/'/g,"\\'")}')"><span>${e}${custom?' <span class="ex-tag">eigene</span>':''}</span>${added?'<span class="ex-done">✓</span>':''}</li>`;
    }).join('');
    return `<div class="modal-overlay" onclick="if(event.target===this)setState({showAddEx:false,addExFilter:''})">
      <div class="modal"><div class="modal-title">Übung wählen</div>
        <div style="margin-bottom:12px"><input class="text-input" id="exFilterInput" placeholder="Suchen..." value="${state.addExFilter}"
          oninput="state.addExFilter=this.value;renderModalList()" style="width:100%"/></div>
        <ul class="ex-list" id="exModalList">${items}</ul>
        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--muted);margin-bottom:8px">NEUE ÜBUNG</div>
          <div class="input-row">
            <input class="text-input" id="newExWorkoutInput" placeholder="Übungsname..." style="font-size:15px"/>
            <button class="btn-secondary" onclick="createAndAddExercise()">+ Add</button>
          </div>
        </div>
      </div></div>`;
  })():'';
  return `<div class="header"><span class="logo">IRON LOG</span>
    <button class="nav-btn" onclick="if(confirm('Workout abbrechen?')){setState({workout:null,view:'home'})}">Abbrechen</button></div>
  <div class="scroll"><div class="container">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px">
      <div class="section-title" style="margin:0">Workout</div>
      <span style="font-size:12px;color:var(--muted)">${dateStr}</span></div>
    ${empty}${cards}
    <button class="btn-secondary" style="width:100%;padding:13px;margin-top:4px;font-size:15px" onclick="setState({showAddEx:true})">+ Übung hinzufügen</button>
  </div></div>
  <div class="workout-footer"><button class="btn-primary" onclick="finishWorkout()">WORKOUT SPEICHERN 💪</button></div>
  ${modalHTML}
  ${timerHTML()}`;
}

function renderModalList() {
  const filter=document.getElementById('exFilterInput')?.value||''; state.addExFilter=filter;
  const fl=filter.toLowerCase();
  const items=allExercises().filter(e=>e.toLowerCase().includes(fl)).map(e=>{
    const added=state.workout.exercises.find(ex=>ex.name===e);
    const custom=(state.data.customExercises||[]).includes(e);
    return `<li onclick="addExerciseToWorkout('${e.replace(/'/g,"\\'")}')"><span>${e}${custom?' <span class="ex-tag">eigene</span>':''}</span>${added?'<span class="ex-done">✓</span>':''}</li>`;
  }).join('');
  const list=document.getElementById('exModalList'); if(list) list.innerHTML=items;
}

document.addEventListener('visibilitychange', () => {
  if(!document.hidden && state.timerEndAt && state.timerInterval) {
    const remaining=Math.max(0,Math.round((state.timerEndAt-Date.now())/1000));
    state.timerSeconds=remaining;
    if(remaining<=0) {
      clearInterval(state.timerInterval); state.timerInterval=null;
      playBeep();
      setTimeout(()=>{ state.timerSeconds=null; render(); },1500);
    } else { render(); }
  }
});

render();
</script>
</body>
</html>
